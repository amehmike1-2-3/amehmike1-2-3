<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <title>Reset Password - NeyoMarket</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f9f9f9 0%, #f5f5f5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      width: 100%;
      background: #fff;
      border-radius: 16px;
      padding: 60px 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
    }
    .icon {
      font-size: 60px;
      text-align: center;
      margin-bottom: 24px;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 700;
      color: #0a0a1a;
      margin-bottom: 12px;
      text-align: center;
    }
    p {
      font-size: 14px;
      color: #4b5563;
      line-height: 1.6;
      margin-bottom: 20px;
      text-align: center;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-weight: 600;
      color: #111827;
      margin-bottom: 8px;
      font-size: 13px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.3s ease;
    }
    input:focus {
      outline: none;
      border-color: #c9922a;
      box-shadow: 0 0 0 3px rgba(201, 146, 42, 0.1);
    }
    .button {
      width: 100%;
      background: linear-gradient(135deg, #c9922a 0%, #a6741f 100%);
      color: #fff;
      padding: 14px;
      border-radius: 8px;
      border: none;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 20px;
    }
    .button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(201, 146, 42, 0.3);
    }
    .button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .error {
      color: #dc2626;
      padding: 16px;
      background: #fee2e2;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      display: none;
    }
    .success {
      color: #059669;
      padding: 16px;
      background: #d1fae5;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      display: none;
    }
    .loader {
      border: 3px solid #f3f4f6;
      border-top: 3px solid #c9922a;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
      display: none;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .password-strength {
      font-size: 12px;
      margin-top: 8px;
      padding: 8px;
      border-radius: 4px;
      text-align: center;
      display: none;
    }
    .strength-weak { background: #fee2e2; color: #dc2626; }
    .strength-medium { background: #fef3c7; color: #92400e; }
    .strength-strong { background: #d1fae5; color: #059669; }
    .back-link {
      text-align: center;
      margin-top: 20px;
    }
    .back-link a {
      color: #c9922a;
      text-decoration: none;
      font-weight: 600;
      font-size: 13px;
    }
    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🔑</div>
    <h1>Reset Your Password</h1>
    <p>Enter your new password below to regain access to your account.</p>

    <div class="error" id="errorMsg"></div>
    <div class="success" id="successMsg"></div>
    <div class="loader" id="loader"></div>

    <form id="resetForm">
      <div class="form-group">
        <label for="password">New Password</label>
        <input type="password" id="password" placeholder="Enter new password (min 8 characters)" required/>
        <div class="password-strength" id="strengthIndicator"></div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm your password" required/>
      </div>

      <button type="submit" class="button" id="submitBtn">🔐 Reset Password</button>
    </form>

    <div class="back-link">
      <a href="https://neyomarket.com.ng/?page=signin">← Back to Sign In</a>
    </div>
  </div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var token = params.get('token');

    var passwordInput = document.getElementById('password');
    var confirmInput = document.getElementById('confirmPassword');
    var form = document.getElementById('resetForm');
    var errorDiv = document.getElementById('errorMsg');
    var successDiv = document.getElementById('successMsg');
    var loader = document.getElementById('loader');
    var submitBtn = document.getElementById('submitBtn');
    var strengthIndicator = document.getElementById('strengthIndicator');

    if (!token) {
      showError('No password reset token provided. Please check your email link.');
      document.getElementById('resetForm').style.display = 'none';
    }

    // Password strength checker
    passwordInput.addEventListener('input', function() {
      var pwd = this.value;
      var strength = checkPasswordStrength(pwd);
      if (pwd.length === 0) {
        strengthIndicator.style.display = 'none';
      } else {
        strengthIndicator.style.display = 'block';
        strengthIndicator.className = 'password-strength strength-' + strength.level;
        strengthIndicator.textContent = strength.message;
      }
    });

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      var password = passwordInput.value;
      var confirmPassword = confirmInput.value;
      errorDiv.style.display = 'none';

      if (password !== confirmPassword) {
        showError('Passwords do not match.');
        return;
      }

      if (password.length < 8) {
        showError('Password must be at least 8 characters.');
        return;
      }

      resetPassword(token, password);
    });

    function checkPasswordStrength(pwd) {
      if (pwd.length < 8) return { level: 'weak', message: '❌ Too short (min 8 characters)' };
      if (!/[A-Z]/.test(pwd) || !/[0-9]/.test(pwd)) {
        return { level: 'medium', message: '⚠️ Medium: Add uppercase & numbers' };
      }
      return { level: 'strong', message: '✅ Strong password' };
    }

    function resetPassword(tok, newPass) {
      submitBtn.disabled = true;
      loader.style.display = 'block';
      submitBtn.textContent = '⏳ Resetting...';

      fetch('/api/auth?action=confirm-password-reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: tok, newPassword: newPass })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        loader.style.display = 'none';
        if (data.ok) {
          showSuccess(data.message);
          form.style.display = 'none';
          setTimeout(function() {
            window.location.href = 'https://neyomarket.com.ng/?page=signin';
          }, 2000);
        } else {
          showError(data.error || 'Failed to reset password.');
          submitBtn.disabled = false;
          submitBtn.textContent = '🔐 Reset Password';
        }
      })
      .catch(function(err) {
        console.error('Error:', err);
        showError('An error occurred. Please try again.');
        loader.style.display = 'none';
        submitBtn.disabled = false;
        submitBtn.textContent = '🔐 Reset Password';
      });
    }

    function showError(msg) {
      errorDiv.textContent = msg;
      errorDiv.style.display = 'block';
      successDiv.style.display = 'none';
    }

    function showSuccess(msg) {
      successDiv.textContent = msg;
      successDiv.style.display = 'block';
      errorDiv.style.display = 'none';
    }
  </script>
</body>
</html>
