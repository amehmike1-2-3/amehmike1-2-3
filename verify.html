<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <title>Email Verification - NeyoMarket</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f9f9f9 0%, #f5f5f5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      width: 100%;
      background: #fff;
      border-radius: 16px;
      padding: 60px 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    .icon {
      font-size: 80px;
      margin-bottom: 24px;
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .icon.success {
      animation: bounceIn 0.6s ease-out;
      font-size: 80px;
    }
    @keyframes bounceIn {
      0% { transform: scale(0); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 700;
      color: #0a0a1a;
      margin-bottom: 12px;
    }
    p {
      font-size: 14px;
      color: #4b5563;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .status {
      background: #f3f4f6;
      border-radius: 8px;
      padding: 16px;
      margin: 24px 0;
      font-size: 13px;
      color: #374151;
    }
    .button {
      display: inline-block;
      background: linear-gradient(135deg, #c9922a 0%, #a6741f 100%);
      color: #fff;
      padding: 14px 40px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 20px;
    }
    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(201, 146, 42, 0.3);
    }
    .error {
      color: #dc2626;
      padding: 16px;
      background: #fee2e2;
      border-radius: 8px;
      margin: 24px 0;
      font-size: 13px;
    }
    .success-message {
      color: #059669;
      padding: 16px;
      background: #d1fae5;
      border-radius: 8px;
      margin: 24px 0;
      font-size: 13px;
    }
    .loader {
      border: 4px solid #f3f4f6;
      border-top: 4px solid #c9922a;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon" id="icon">⏳</div>
    <h1 id="title">Verifying Your Email</h1>
    <p id="message">Please wait while we confirm your email address...</p>
    <div class="loader" id="loader"></div>
    <div class="status" id="status"></div>
    <div id="errorMsg" class="error" style="display:none;"></div>
    <div id="successMsg" class="success-message" style="display:none;"></div>
    <button class="button" id="actionBtn" style="display:none;"></button>
  </div>

  <script>
    // Get token from URL
    var params = new URLSearchParams(window.location.search);
    var token = params.get('token');

    if (!token) {
      showError('No verification token provided. Please check your email link.');
    } else {
      verifyEmail(token);
    }

    function verifyEmail(tok) {
      fetch('/api/auth?action=verify-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: tok })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok || data.user) {
          showSuccess(data.message || 'Email verified successfully!');
        } else if (data.error) {
          showError(data.error);
        }
      })
      .catch(function(err) {
        console.error('Verification error:', err);
        showError('An error occurred during verification. Please try again.');
      });
    }

    function showSuccess(msg) {
      document.getElementById('icon').textContent = '✅';
      document.getElementById('icon').classList.add('success');
      document.getElementById('loader').style.display = 'none';
      document.getElementById('title').textContent = 'Email Verified!';
      document.getElementById('message').textContent = msg;
      
      var successDiv = document.getElementById('successMsg');
      successDiv.textContent = '🎉 Your account is now active. You can sign in and start using NeyoMarket!';
      successDiv.style.display = 'block';
      
      var btn = document.getElementById('actionBtn');
      btn.textContent = 'Sign In Now →';
      btn.style.display = 'inline-block';
      btn.onclick = function() {
        window.location.href = 'https://neyomarket.com.ng/?page=signin';
      };
    }

    function showError(msg) {
      document.getElementById('icon').textContent = '❌';
      document.getElementById('loader').style.display = 'none';
      document.getElementById('title').textContent = 'Verification Failed';
      document.getElementById('message').textContent = '';
      
      var errDiv = document.getElementById('errorMsg');
      errDiv.textContent = msg;
      errDiv.style.display = 'block';
      
      var btn = document.getElementById('actionBtn');
      btn.textContent = 'Back to Sign In';
      btn.style.display = 'inline-block';
      btn.onclick = function() {
        window.location.href = 'https://neyomarket.com.ng/?page=signin';
      };
    }
  </script>
</body>
</html>
